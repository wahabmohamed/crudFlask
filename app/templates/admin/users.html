{% extends 'base.html' %}
{% block title %}Utilisateurs (Admin){% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Utilisateurs</h2>
  <a class="btn btn-primary" href="{{ url_for('user.create') }}"><i class="fa-solid fa-user-plus me-1"></i> Ajouter</a>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr><th>Utilisateur</th><th>Nom</th><th>Email</th><th>Rôle</th><th class="text-end">Actions</th></tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u.username }}</td>
          <td>{{ (u.first_name ~ ' ' ~ u.last_name)|trim }}</td>
          <td>{{ u.email }}</td>
          <td><span class="badge {% if u.role=='admin' %}text-bg-dark{% else %}text-bg-secondary{% endif %}">{{ u.role }}</span></td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-warning" href="{{ url_for('user.edit', user_id=u.id) }}"><i class="fa-solid fa-pen"></i></a>
            <form method="post" action="{{ url_for('user.delete', user_id=u.id) }}" class="d-inline" onsubmit="return confirm('Supprimer cet utilisateur ?')">
              <button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
